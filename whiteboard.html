<script>
const SB_URL = 'https://gcumgpfyfqtfwbskkngt.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjdW1ncGZ5ZnF0Zndic2trbmd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDczMTAsImV4cCI6MjA4ODM4MzMxMH0.OSY0XEPQp-WsFWuiGrUG5fcLIVMI3c8AxBEv2shFftg';
const _sb = supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession:true, autoRefreshToken:true, storageKey:'v158fw-auth' } });

const STORE = 'v158fw-wb3';
const WB_ROW_ID = 'main';
let _myPresenceId = 'user_' + Math.random().toString(36).slice(2,8);
let _myName = null;
let _remoteViewers = {};
const PRESENCE_COLORS = ['#5a8fc4','#4caf50','#ffd700','#ff8c00','#e85a4a','#c8a820','#a0aab4','#ffffff'];
let _myColor = PRESENCE_COLORS[Math.floor(Math.random()*PRESENCE_COLORS.length)];
let _ignoreRemote = false;
let _pendingRemoteState = null;
let tool='draw', penColor='#ffffff', penWidth=2;
let strokes=[], labels=[], magnets=[], aircraft=[], holds=[], mapMode='off', sidebarOpen=false;
let acSize=50;
let painting=false, curStroke=[], curStrokeGeo=null, ctrlSmooth=false, altStraight=false;
let selectedAcIds=new Set(), groupDragOffsets=null;
let txtPos=null, editingLabelId=null;
let dragMag=null, dragOX=0, dragOY=0, dragMoved=false;
let map=null, lStreet=null, lSat=null, lAip=null;

const canvas=document.getElementById('cv'), ctx=canvas.getContext('2d');
const DPR=window.devicePixelRatio||1;
const board=document.getElementById('board');

function sizeCanvas(){
    const w=board.clientWidth, h=board.clientHeight;
    canvas.width=w*DPR; canvas.height=h*DPR;
    canvas.style.width=w+'px'; canvas.style.height=h+'px';
    ctx.scale(DPR,DPR); redraw();
}

function redraw(){
    const w=board.clientWidth, h=board.clientHeight;
    ctx.clearRect(0,0,w,h);
    strokes.forEach(drawStroke);
    labels.forEach(drawLabel);
}

function drawStroke(s){
    let pts=s.points;
    if(s.geoPoints&&mapMode!=='off'&&map){
        pts=s.geoPoints.map(ll=>{ const p=map.latLngToContainerPoint(L.latLng(ll.lat,ll.lng)); return [p.x,p.y]; });
    }
    if(!pts||pts.length<2) return;
    ctx.save();
    let lw=s.width;
    if(s.erase&&s.eraseZoom!=null&&s.geoPoints&&mapMode!=='off'&&map){
        lw=s.width*Math.pow(2,map.getZoom()-s.eraseZoom);
    }
    ctx.beginPath(); ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=lw;
    if(s.erase){ ctx.globalCompositeOperation='destination-out'; ctx.strokeStyle='rgba(0,0,0,1)'; }
    else        { ctx.globalCompositeOperation='source-over';    ctx.strokeStyle=s.color; }
    ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.stroke(); ctx.restore();
}

function lbText(lb){ return lb.runs?lb.runs.map(r=>r.text).join(''):(lb.text||''); }

function drawLabel(lb){
    let x=lb.x, y=lb.y;
    if(lb.lat!=null&&mapMode!=='off'&&map){ const p=map.latLngToContainerPoint(L.latLng(lb.lat,lb.lng)); x=p.x; y=p.y; }
    ctx.save();
    ctx.globalCompositeOperation='source-over';
    ctx.font='bold '+(lb.size||16)+'px "Segoe UI",Arial,sans-serif';
    ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=4;
    if(lb.runs&&lb.runs.length){
        let cx=x;
        lb.runs.forEach(run=>{ ctx.fillStyle=run.color||'#fff'; ctx.fillText(run.text,cx,y); cx+=ctx.measureText(run.text).width; });
    } else { ctx.fillStyle=lb.color||'#fff'; ctx.fillText(lb.text||'',x,y); }
    ctx.restore();
}

function extractRuns(el){
    const runs=[];
    function walk(node,color){
        if(node.nodeType===3){ if(node.textContent) runs.push({text:node.textContent,color:color||'#ffffff'}); }
        else if(node.nodeType===1){
            let c=color;
            if(node.style&&node.style.color) c=node.style.color;
            else if(node.tagName==='FONT'&&node.color) c=node.color;
            node.childNodes.forEach(ch=>walk(ch,c));
        }
    }
    walk(el,'#ffffff');
    const merged=[];
    runs.forEach(r=>{ if(merged.length&&merged[merged.length-1].color===r.color) merged[merged.length-1].text+=r.text; else merged.push({text:r.text,color:r.color}); });
    return merged.filter(r=>r.text);
}

function runsToHtml(lb){
    const runs=lb.runs||[{text:lb.text||'',color:lb.color||'#ffffff'}];
    return runs.map(r=>'<span style="color:'+r.color+'">'+esc(r.text)+'</span>').join('');
}

function evtXY(e){
    const r=canvas.getBoundingClientRect(), src=e.touches?e.touches[0]:e;
    return [src.clientX-r.left, src.clientY-r.top];
}

canvas.addEventListener('mousedown',  pd);
canvas.addEventListener('mousemove',  pm);
canvas.addEventListener('mouseup',    pu);
canvas.addEventListener('mouseleave', pu);
canvas.addEventListener('touchstart', pd, {passive:false});
canvas.addEventListener('touchmove',  pm, {passive:false});
canvas.addEventListener('touchend',   pu);
canvas.addEventListener('contextmenu', onCanvasRightClick);

// ── Line info (right-click) ─────────────────────────────────────────────────
function _ptSegDist(px,py,ax,ay,bx,by){
    const dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy;
    if(len2===0) return Math.hypot(px-ax,py-ay);
    const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/len2));
    return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}
function _strokePxPts(s){
    if(s.geoPoints&&mapMode!=='off'&&map)
        return s.geoPoints.map(ll=>{ const p=map.latLngToContainerPoint(L.latLng(ll.lat,ll.lng)); return [p.x,p.y]; });
    return s.points;
}
function _haversineNM(lat1,lon1,lat2,lon2){
    const R=3440.065,toR=Math.PI/180;
    const dLat=(lat2-lat1)*toR,dLon=(lon2-lon1)*toR;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)**2;
    return R*2*Math.asin(Math.sqrt(a));
}
function _bearing(lat1,lon1,lat2,lon2){
    const toR=Math.PI/180;
    const y=Math.sin((lon2-lon1)*toR)*Math.cos(lat2*toR);
    const x=Math.cos(lat1*toR)*Math.sin(lat2*toR)-Math.sin(lat1*toR)*Math.cos(lat2*toR)*Math.cos((lon2-lon1)*toR);
    return ((Math.atan2(y,x)*180/Math.PI)+360)%360;
}
function onCanvasRightClick(e){
    if(painting) return;
    e.preventDefault();
    const [mx,my]=evtXY(e);
    let found=null;
    for(let i=strokes.length-1;i>=0;i--){
        const s=strokes[i]; if(s.erase) continue;
        const pts=_strokePxPts(s); if(!pts||pts.length<2) continue;
        for(let j=0;j<pts.length-1;j++){
            if(_ptSegDist(mx,my,pts[j][0],pts[j][1],pts[j+1][0],pts[j+1][1])<=9){ found=s; break; }
        }
        if(found) break;
    }
    if(found) _showLinePopup(e.clientX,e.clientY,found);
    else _hideLinePopup();
}
function _showLinePopup(cx,cy,s){
    const pop=document.getElementById('line-popup');
    let html='';
    const geo=s.geoPoints;
    if(geo&&geo.length>=2){
        let dist=0;
        for(let i=0;i<geo.length-1;i++) dist+=_haversineNM(geo[i].lat,geo[i].lng,geo[i+1].lat,geo[i+1].lng);
        const bFwd=_bearing(geo[0].lat,geo[0].lng,geo[geo.length-1].lat,geo[geo.length-1].lng);
        const bBack=(bFwd+180)%360;
        const fmt=n=>String(Math.round(n)).padStart(3,'0');
        html='<div class="lp-row"><span class="lp-lbl">Distance</span><span class="lp-val">'+dist.toFixed(1)+' NM</span></div>'+
             '<div class="lp-row"><span class="lp-lbl">Bearing</span><span class="lp-val">'+fmt(bFwd)+'&deg;</span></div>'+
             '<div class="lp-row"><span class="lp-lbl">Back Brg</span><span class="lp-val">'+fmt(bBack)+'&deg;</span></div>';
    } else {
        const pts=s.points; if(!pts||pts.length<2){ _hideLinePopup(); return; }
        let px=0; for(let i=0;i<pts.length-1;i++) px+=Math.hypot(pts[i+1][0]-pts[i][0],pts[i+1][1]-pts[i][1]);
        html='<div class="lp-row"><span class="lp-lbl">Distance</span><span class="lp-val">'+Math.round(px)+' px</span></div>'+
             '<div class="lp-note">Enable map for NM &amp; bearing</div>';
    }
    pop.innerHTML=html;
    const W=175,vw=window.innerWidth,vh=window.innerHeight;
    let left=cx+14,top=cy-8;
    if(left+W>vw-8) left=cx-W-8;
    if(top+100>vh-8) top=vh-108;
    pop.style.left=left+'px'; pop.style.top=top+'px';
    pop.classList.add('vis');
}
function _hideLinePopup(){ document.getElementById('line-popup').classList.remove('vis'); }
document.addEventListener('mousedown',e=>{ if(!e.target.closest('#line-popup')) _hideLinePopup(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') _hideLinePopup(); });

// Chaikin corner-cutting smoothing (pts = [[x,y],...] or [[a,b],...])
function chaikin(pts, iterations){
    let p=pts;
    for(let i=0;i<iterations;i++){
        const out=[p[0]];
        for(let j=0;j<p.length-1;j++){
            const ax=p[j][0],ay=p[j][1],bx=p[j+1][0],by=p[j+1][1];
            out.push([ax*.75+bx*.25, ay*.75+by*.25]);
            out.push([ax*.25+bx*.75, ay*.25+by*.75]);
        }
        out.push(p[p.length-1]);
        p=out;
    }
    return p;
}

function pd(e){
    if(tool==='text'){ e.preventDefault(); placeTxtCursor(e); return; }
    if(tool!=='draw'&&tool!=='erase') return;
    e.preventDefault(); painting=true; ctrlSmooth=false; altStraight=false;
    const xy=evtXY(e); curStroke=[xy];
    const ll=xyToLL(xy[0],xy[1]); curStrokeGeo=ll?[{lat:ll.lat,lng:ll.lng}]:null;
}
function pm(e){
    if(!painting) return;
    e.preventDefault();
    if(e.altKey){ altStraight=true; }
    else if(e.ctrlKey||e.metaKey) ctrlSmooth=true;
    const xy=evtXY(e);
    if(altStraight){
        // Keep only start point + current point for live preview
        redraw();
        drawStroke({color:penColor, width:tool==='erase'?30:penWidth, erase:tool==='erase', points:[curStroke[0],xy]});
        return;
    }
    curStroke.push(xy);
    if(curStrokeGeo){ const ll=xyToLL(xy[0],xy[1]); if(ll) curStrokeGeo.push({lat:ll.lat,lng:ll.lng}); }
    redraw();
    const previewPts=ctrlSmooth?chaikin(curStroke,2):curStroke;
    drawStroke({color:penColor, width:tool==='erase'?30:penWidth, erase:tool==='erase', points:previewPts});
}
function pu(e){
    if(!painting) return;
    painting=false;
    if(altStraight){
        // Straight line: just start + end
        const endXY=e&&(e.changedTouches?evtXY(e):evtXY(e))||curStroke[curStroke.length-1];
        const pts=[curStroke[0],endXY];
        const geo0=xyToLL(pts[0][0],pts[0][1]), geo1=xyToLL(pts[1][0],pts[1][1]);
        const s={id:'s_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),color:penColor,width:tool==='erase'?30:penWidth,erase:tool==='erase',points:pts};
        if(tool==='erase'&&mapMode!=='off'&&map) s.eraseZoom=map.getZoom();
        if(geo0&&geo1) s.geoPoints=[{lat:geo0.lat,lng:geo0.lng},{lat:geo1.lat,lng:geo1.lng}];
        strokes.push(s); save();
        altStraight=false; curStroke=[]; curStrokeGeo=null; ctrlSmooth=false; _applyPendingRemote(); redraw(); return;
    }
    if(curStroke.length>1){
        let pts=curStroke, geo=curStrokeGeo;
        if(ctrlSmooth){
            pts=chaikin(curStroke,3);
            if(geo&&geo.length>1) geo=chaikin(geo.map(g=>[g.lat,g.lng]),3).map(p=>({lat:p[0],lng:p[1]}));
        }
        const s={id:'s_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),color:penColor,width:tool==='erase'?30:penWidth,erase:tool==='erase',points:pts};
        if(tool==='erase'&&mapMode!=='off'&&map) s.eraseZoom=map.getZoom();
        if(geo) s.geoPoints=geo;
        strokes.push(s); save();
    }
    curStroke=[]; curStrokeGeo=null; ctrlSmooth=false; altStraight=false;
    _applyPendingRemote();
}

const txtWrap=document.getElementById('txt-wrap'), txtField=document.getElementById('txt-field');
function placeTxtCursor(e){
    const [x,y]=evtXY(e);
    const br=board.getBoundingClientRect(), src=e.touches?e.touches[0]:e;
    // check if clicking on an existing label
    for(let i=labels.length-1;i>=0;i--){
        const lb=labels[i];
        let lx=lb.x, ly=lb.y;
        if(lb.lat!=null&&mapMode!=='off'&&map){ const p=map.latLngToContainerPoint(L.latLng(lb.lat,lb.lng)); lx=p.x; ly=p.y; }
        const sz=lb.size||16, approxW=lbText(lb).length*sz*0.6;
        if(x>=lx-8&&x<=lx+approxW+8&&y>=ly-sz-4&&y<=ly+8){
            editingLabelId=lb.id; txtPos={x:lx,y:ly};
            txtWrap.style.left=(lx)+'px'; txtWrap.style.top=(ly-sz-8)+'px';
            txtWrap.classList.add('vis'); txtField.innerHTML=runsToHtml(lb);
            setTimeout(()=>{ txtField.focus(); document.execCommand('selectAll'); },0);
            return;
        }
    }
    // new label
    editingLabelId=null; txtPos={x,y};
    txtWrap.style.left=(src.clientX-br.left)+'px';
    txtWrap.style.top=(src.clientY-br.top-34)+'px';
    txtWrap.classList.add('vis'); txtField.innerHTML='';
    setTimeout(()=>txtField.focus(),0);
}
txtField.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); commitTxt(); }
    if(e.key==='Escape'){ txtWrap.classList.remove('vis'); txtPos=null; editingLabelId=null; }
});
txtField.addEventListener('blur', ()=>{ if(txtField.textContent.trim()||editingLabelId) commitTxt(); else{ txtWrap.classList.remove('vis'); txtPos=null; editingLabelId=null; } });
function commitTxt(){
    const runs=extractRuns(txtField);
    const fullText=runs.map(r=>r.text).join('').trim();
    if(editingLabelId){
        const lb=labels.find(l=>l.id===editingLabelId);
        if(lb){
            if(fullText){ lb.runs=runs; lb.text=fullText; lb.color=runs[0]?.color||penColor; }
            else labels=labels.filter(l=>l.id!==editingLabelId);
        }
        save(); redraw();
    } else if(fullText&&txtPos){
        const lb={id:Date.now(),runs,text:fullText,x:txtPos.x,y:txtPos.y,color:runs[0]?.color||penColor,size:Math.max(12,penWidth*4)};
        const ll=xyToLL(txtPos.x,txtPos.y); if(ll){lb.lat=ll.lat;lb.lng=ll.lng;}
        labels.push(lb); save(); redraw();
    }
    txtWrap.classList.remove('vis'); txtPos=null; editingLabelId=null;
}

function rankColor(r){ if(!r) return '#6a7280'; const s=r.toLowerCase().replace(/[^a-z]/g,''); for(const [k,c] of RC) if(s.includes(k)) return c; return '#6a7280'; }

const MAG_COLORS=['#e85a4a','#5a8fc4','#4caf50','#ffd700','#ff8c00','#c8a820','#a0aab4','#ffffff'];
function cycleMagColor(id){
    const m=magnets.find(m=>m.id===id); if(!m) return;

function placeMag(callsign,rank){

function removeMag(id){ magnets=magnets.filter(m=>m.id!==id); renderMagnets(); save(); }

function updateMagnetPositions(){
    magnets.forEach(m=>{
        if(m.lat!=null&&mapMode!=='off'&&map){
            const p=map.latLngToContainerPoint(L.latLng(m.lat,m.lng));
            m.x=p.x; m.y=p.y;

function startDragMag(e,id){
    if(e.target.classList.contains('m-x')) return;
    e.preventDefault(); e.stopPropagation();
    const m=magnets.find(m=>m.id===id); if(!m) return;
    dragMag=m; dragMoved=false;
    const src=e.touches?e.touches[0]:e, rect=board.getBoundingClientRect();
    dragOX=src.clientX-rect.left-m.x; dragOY=src.clientY-rect.top-m.y;
    document.getElementById('mg-'+id)?.classList.add('drag');
}

    if(!dragMag) return;
    dragMoved=true;
    const src=e.touches?e.touches[0]:e, rect=board.getBoundingClientRect();
    dragMag.x=Math.max(0,Math.min(board.clientWidth-60, src.clientX-rect.left-dragOX));
    dragMag.y=Math.max(0,Math.min(board.clientHeight-30,src.clientY-rect.top-dragOY));

    if(el){ el.style.left=dragMag.x+'px'; el.style.top=dragMag.y+'px'; }
}

function endMag(){
    if(!dragMag) return;
    document.getElementById('mg-'+dragMag.id)?.classList.remove('drag');

    else{ const ll=xyToLL(dragMag.x,dragMag.y); if(ll){dragMag.lat=ll.lat;dragMag.lng=ll.lng;} }

    const ht=Math.round(w/2), col=h.color||'#ffffff';
    return `<svg viewBox="0 0 200 100" width="${w}" height="${ht}" style="display:block;pointer-events:none;overflow:visible">`+
        `<path d="M50 4 L150 4 A46 46 0 0 1 150 96 L50 96 A46 46 0 0 1 50 4 Z" fill="${col}18" stroke="${col}" stroke-width="3" stroke-linejoin="round"/>`+
        `</svg>`;
}
function buildHoldToken(h){
    const w=holdScaledSize(h), ht=Math.round(w/2);
    const el=document.createElement('div');
    el.className='hold-token'; el.id='hld-'+h.id;
    el.style.left=(h.x-w/2)+'px'; el.style.top=(h.y-ht/2)+'px';
    if(h.angle) el.style.transform='rotate('+h.angle+'deg)';
    el.innerHTML='<button class="m-x" onclick="removeHold(\''+h.id+'\')" title="Delete">x</button>'+holdSVG(h,w);
    el.addEventListener('mousedown', e=>startDragHold(e,h.id));
    el.addEventListener('touchstart', e=>startDragHold(e,h.id), {passive:false});
    el.addEventListener('contextmenu', e=>{ e.preventDefault(); rotateHold(h.id); });
    return el;
}
function renderHolds(){ document.querySelectorAll('.hold-token').forEach(el=>el.remove()); holds.forEach(h=>document.getElementById('mag-layer').appendChild(buildHoldToken(h))); }
function updateHoldPositions(){
    holds.forEach(h=>{
        if(h.lat!=null&&mapMode!=='off'&&map){
            const p=map.latLngToContainerPoint(L.latLng(h.lat,h.lng));
            h.x=p.x; h.y=p.y;
        }
        const el=document.getElementById('hld-'+h.id);
        if(el){
            const w=holdScaledSize(h), ht=Math.round(w/2);
            el.style.left=(h.x-w/2)+'px'; el.style.top=(h.y-ht/2)+'px';
            const svg=el.querySelector('svg'); if(svg){ svg.setAttribute('width',w); svg.setAttribute('height',ht); }
        }
    });
}
function placeHoldCenter(){
    placeHold(board.clientWidth/2, board.clientHeight/2);
}
function placeHold(x,y){
    const id='hld_'+Date.now();
    const h={id,x,y,color:penColor,angle:0,size:holdSize,turns:'RT',refZoom:(mapMode!=='off'&&map?map.getZoom():null)};
    const ll=xyToLL(x,y); if(ll){h.lat=ll.lat;h.lng=ll.lng;}
    holds.push(h); renderHolds(); save();
}
function removeHold(id){ holds=holds.filter(h=>h.id!==id); renderHolds(); save(); }
function rotateHold(id){
    const h=holds.find(h=>h.id===id); if(!h) return;
    h.angle=((h.angle||0)+45)%360;
    const el=document.getElementById('hld-'+id); if(el) el.style.transform='rotate('+h.angle+'deg)'; save();
}
function cycleHoldColor(id){
    const h=holds.find(h=>h.id===id); if(!h) return;
    const idx=MAG_COLORS.indexOf(h.color); h.color=MAG_COLORS[(idx+1)%MAG_COLORS.length];
    renderHolds(); save();
}
function toggleHoldTurns(id){
    const h=holds.find(h=>h.id===id); if(!h) return;
    h.turns=h.turns==='RT'?'LT':'RT'; renderHolds(); save();
}
function startDragHold(e,id){
    if(e.target.classList.contains('m-x')) return;
    if(e.button&&e.button!==0) return;
    e.preventDefault(); e.stopPropagation();
    const h=holds.find(h=>h.id===id); if(!h) return;
    dragHold=h; dragHoldMoved=false;
    const src=e.touches?e.touches[0]:e, rect=board.getBoundingClientRect();
    dragHoldOX=src.clientX-rect.left-h.x; dragHoldOY=src.clientY-rect.top-h.y;
    document.getElementById('hld-'+id)?.classList.add('drag');
}
document.addEventListener('mousemove', moveHold);
document.addEventListener('touchmove', moveHold, {passive:false});
function moveHold(e){
    if(!dragHold) return; dragHoldMoved=true;
    const src=e.touches?e.touches[0]:e, rect=board.getBoundingClientRect();
    dragHold.x=Math.max(0,Math.min(board.clientWidth,src.clientX-rect.left-dragHoldOX));
    dragHold.y=Math.max(0,Math.min(board.clientHeight,src.clientY-rect.top-dragHoldOY));
    const w=holdScaledSize(dragHold), ht=Math.round(w/2);
    const el=document.getElementById('hld-'+dragHold.id);
    if(el){ el.style.left=(dragHold.x-w/2)+'px'; el.style.top=(dragHold.y-ht/2)+'px'; }
}
document.addEventListener('mouseup', endHold);
document.addEventListener('touchend', endHold);
function endHold(){
    if(!dragHold) return;
    document.getElementById('hld-'+dragHold.id)?.classList.remove('drag');
    if(!dragHoldMoved) cycleHoldColor(dragHold.id);
    else{ const ll=xyToLL(dragHold.x,dragHold.y); if(ll){dragHold.lat=ll.lat;dragHold.lng=ll.lng;} }
    dragHold=null; save();
}

function buildAcToken(a){
    const el=document.createElement('div');
    el.className='ac-token'; el.id='act-'+a.id;
    el.style.left=a.x+'px'; el.style.top=a.y+'px';
    if(a.angle) el.style.transform='rotate('+a.angle+'deg)';
    el.innerHTML='<button class="m-x" onclick="removeAc(\''+a.id+'\')" >x</button><img src="assets/F-35 Stick.png" class="f35-img" draggable="false" style="width:'+acScaledSize(a)+'px;filter:'+acFilter(a.color)+'">';
    el.addEventListener('mousedown', e=>startDragAc(e,a.id));
    el.addEventListener('touchstart', e=>startDragAc(e,a.id), {passive:false});
    el.addEventListener('contextmenu', e=>{ e.preventDefault(); rotateAc(a.id); });
    return el;
}

function placeAc(x,y){
    const id='ac_'+Date.now();
    const a={id,x,y,color:'#e85a4a',angle:0,size:acSize,refZoom:(mapMode!=='off'&&map?map.getZoom():null)};
    const ll=xyToLL(x,y); if(ll){a.lat=ll.lat;a.lng=ll.lng;}
    aircraft.push(a); renderAircraft(); save();
}
function removeAc(id){ aircraft=aircraft.filter(a=>a.id!==id); renderAircraft(); save(); }

function cycleAcColor(id){
    const a=aircraft.find(a=>a.id===id); if(!a) return;
    const idx=MAG_COLORS.indexOf(a.color);
    a.color=MAG_COLORS[(idx+1)%MAG_COLORS.length];
    const el=document.getElementById('act-'+id);
    if(el){ el.querySelector('.f35-img').style.filter=acFilter(a.color); } save();
}
function rotateAc(id){
    const a=aircraft.find(a=>a.id===id); if(!a) return;
    a.angle=((a.angle||0)+45)%360;
    const el=document.getElementById('act-'+id); if(el) el.style.transform='rotate('+a.angle+'deg)'; save();
}

function selectAc(id,additive){
    if(!additive){selectedAcIds.clear();aircraft.forEach(a=>document.getElementById('act-'+a.id)?.classList.remove('ac-sel'));}
    if(selectedAcIds.has(id)){selectedAcIds.delete(id);document.getElementById('act-'+id)?.classList.remove('ac-sel');}
    else{selectedAcIds.add(id);document.getElementById('act-'+id)?.classList.add('ac-sel');}
}
function startDragAc(e,id){
    if(e.target.classList.contains('m-x')) return;
    if(e.button&&e.button!==0) return;
    e.preventDefault(); e.stopPropagation();
    if(e.ctrlKey||e.metaKey){ selectAc(id,true); return; }
    const a=aircraft.find(a=>a.id===id); if(!a) return;
    if(!selectedAcIds.has(id)){selectedAcIds.clear();aircraft.forEach(a=>document.getElementById('act-'+a.id)?.classList.remove('ac-sel'));}
    dragAc=a; dragAcMoved=false;
    const src=e.touches?e.touches[0]:e, rect=board.getBoundingClientRect();
    dragAcOX=src.clientX-rect.left-a.x; dragAcOY=src.clientY-rect.top-a.y;
    document.getElementById('act-'+id)?.classList.add('drag');
    if(selectedAcIds.has(id)){
        groupDragOffsets={};
        selectedAcIds.forEach(sid=>{ const sa=aircraft.find(a=>a.id===sid); if(sa) groupDragOffsets[sid]={dx:sa.x-a.x,dy:sa.y-a.y}; });
    }
}
document.addEventListener('mousemove',moveAc);
document.addEventListener('touchmove',moveAc,{passive:false});
function moveAc(e){
    if(!dragAc) return; dragAcMoved=true;
    const src=e.touches?e.touches[0]:e, rect=board.getBoundingClientRect();
    const nx=Math.max(0,Math.min(board.clientWidth-40,src.clientX-rect.left-dragAcOX));
    const ny=Math.max(0,Math.min(board.clientHeight-55,src.clientY-rect.top-dragAcOY));
    dragAc.x=nx; dragAc.y=ny;
    const el=document.getElementById('act-'+dragAc.id);
    if(el){ el.style.left=nx+'px'; el.style.top=ny+'px'; }
    if(selectedAcIds.has(dragAc.id)&&groupDragOffsets){
        selectedAcIds.forEach(sid=>{
            if(sid===dragAc.id) return;
            const sa=aircraft.find(a=>a.id===sid); if(!sa) return;
            const off=groupDragOffsets[sid]||{dx:0,dy:0};
            sa.x=Math.max(0,Math.min(board.clientWidth-40,nx+off.dx));
            sa.y=Math.max(0,Math.min(board.clientHeight-55,ny+off.dy));
            const sel=document.getElementById('act-'+sid);
            if(sel){sel.style.left=sa.x+'px';sel.style.top=sa.y+'px';}
        });
    }
}
function endAc(){
    if(!dragAc) return;
    document.getElementById('act-'+dragAc.id)?.classList.remove('drag');
    if(!dragAcMoved){ cycleAcColor(dragAc.id); }
    else{
        const setLL=(a)=>{ const ll=xyToLL(a.x,a.y); if(ll){a.lat=ll.lat;a.lng=ll.lng;} };
        setLL(dragAc);
        if(selectedAcIds.has(dragAc.id)) selectedAcIds.forEach(sid=>{ const sa=aircraft.find(a=>a.id===sid); if(sa) setLL(sa); });
    }
    dragAc=null; groupDragOffsets=null; save();
}
document.addEventListener('mouseup',endAc);
document.addEventListener('touchend',endAc);

function startAcToolbarDrag(e){
    if(e.button!==undefined&&e.button!==0) return;
    e.preventDefault();
    const src=e.touches?e.touches[0]:e, ghost=document.createElement('div');
    const half=Math.round(acSize/2);
    ghost.style.cssText='position:fixed;pointer-events:none;z-index:99999;opacity:.88;transform:translate(-'+half+'px,-'+half+'px);';
    ghost.innerHTML='<img src="assets/F-35 Stick.png" class="f35-img" draggable="false" style="width:'+acSize+'px;filter:'+acFilter('#e85a4a')+'">';
    ghost.style.left=src.clientX+'px'; ghost.style.top=src.clientY+'px';
    document.body.appendChild(ghost);
    acToolbarDrag={ghost,moved:false};
}
function moveAcGhost(e){
    if(!acToolbarDrag) return; acToolbarDrag.moved=true;
    const src=e.touches?e.touches[0]:e;
    acToolbarDrag.ghost.style.left=src.clientX+'px'; acToolbarDrag.ghost.style.top=src.clientY+'px';
}
document.addEventListener('mousemove',moveAcGhost);
document.addEventListener('touchmove',moveAcGhost,{passive:false});
function endAcGhost(e){
    if(!acToolbarDrag) return;
    const {ghost,moved}=acToolbarDrag; acToolbarDrag=null; document.body.removeChild(ghost);
    const src=e.changedTouches?e.changedTouches[0]:e;
    const br=board.getBoundingClientRect();
    const bx=src.clientX-br.left-20, by=src.clientY-br.top-27;
    if(bx>=-20&&by>=-27&&bx<board.clientWidth&&by<board.clientHeight){
        placeAc(Math.max(0,Math.min(board.clientWidth-40,bx)),Math.max(0,Math.min(board.clientHeight-55,by)));
    } else if(!moved){ placeAc(board.clientWidth/2-20,board.clientHeight/2-27); }
}
document.addEventListener('mouseup',endAcGhost);
document.addEventListener('touchend',endAcGhost);

// Prevent color swatches and width buttons from stealing focus from the text editor
document.querySelectorAll('.wb-sw,.wb-w').forEach(el=>{
    el.addEventListener('mousedown',e=>{ if(txtWrap.classList.contains('vis')) e.preventDefault(); });
});

// Undo / Clear
function undo(){ if(labels.length) labels.pop(); else if(strokes.length) strokes.pop(); redraw(); save(); }
function clearAll(){ if(!confirm('Clear all drawings, labels, aircraft, and holds?')) return; strokes=[]; labels=[]; aircraft=[]; holds=[]; selectedAcIds.clear(); renderAircraft(); renderHolds(); redraw(); save(); }

// Keyboard
document.addEventListener('keydown',e=>{
    if(['INPUT','TEXTAREA'].includes(e.target.tagName)||e.target.isContentEditable) return;
    if(e.key==='d'||e.key==='D') setTool('draw');
    if(e.key==='e'||e.key==='E') setTool('erase');
    if(e.key==='t'||e.key==='T') setTool('text');
    if(e.key==='p'||e.key==='P') setTool('pan');
    if(e.key==='h'||e.key==='H') placeHoldCenter();
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); undo(); }
    if(e.key==='Escape'){ selectedAcIds.clear(); aircraft.forEach(a=>document.getElementById('act-'+a.id)?.classList.remove('ac-sel')); }
});

// Status
const HINTS={draw:'DRAW -- D=Draw  E=Erase  T=Text  P=Pan  H=Insert Hold  Ctrl+Z=Undo  |  Hold Ctrl = smooth  |  Hold Alt = straight line  |  Ctrl+Click aircraft to select  Esc=Deselect',erase:'ERASE -- drag to erase',text:'TEXT -- click to place label, Enter to commit  |  Ctrl+Scroll over label = resize',pan:'PAN -- drag to pan the map | Aircraft: Ctrl+Click=Select  Ctrl+Scroll=Resize selected'};
function updateStatus(){ document.getElementById('statusbar').textContent=HINTS[tool]||''; }

// Ctrl+Scroll to resize F-35 tokens (selected only, or all if no selection); also resizes holds when hovering over them; also resizes text labels
board.addEventListener('wheel', e=>{
    if(!e.ctrlKey) return;
    e.preventDefault();
    const delta=e.deltaY<0?6:-6;
    // check if cursor is over a hold token
    const overHold=e.target?.closest?.('.hold-token');
    if(overHold){
        const hid=overHold.id.replace('hld-','');
        const h=holds.find(h=>h.id===hid); if(h){ h.size=Math.max(40,Math.min(600,(h.size||holdSize)+delta*4)); renderHolds(); save(); }
        return;
    }
    // check if cursor is over a text label (canvas-rendered, so use mouse coords)
    if(e.target===canvas){
        const r=canvas.getBoundingClientRect();
        const mx=e.clientX-r.left, my=e.clientY-r.top;
        for(let i=labels.length-1;i>=0;i--){
            const lb=labels[i];
            let lx=lb.x, ly=lb.y;
            if(lb.lat!=null&&mapMode!=='off'&&map){ const p=map.latLngToContainerPoint(L.latLng(lb.lat,lb.lng)); lx=p.x; ly=p.y; }
            const sz=lb.size||16;
            const approxW=lbText(lb).length*sz*0.6;
            if(mx>=lx-8&&mx<=lx+approxW+8&&my>=ly-sz-4&&my<=ly+8){
                lb.size=Math.max(8,Math.min(160,(lb.size||16)+delta));
                redraw(); save(); return;
            }
        }
    }
    if(selectedAcIds.size>0){
        selectedAcIds.forEach(sid=>{
            const a=aircraft.find(a=>a.id===sid); if(!a) return;
            a.size=Math.max(20,Math.min(200,(a.size||acSize)+delta));
            const img=document.querySelector('#act-'+sid+' .f35-img');
            if(img) img.style.width=a.size+'px';
        });
        save();
    }
},{passive:false});

// Save/Load
function save(){
    try{ localStorage.setItem(STORE,JSON.stringify(wbStateObj())); } catch(e){}
    _ignoreRemote=true;
    clearTimeout(save._irt); save._irt=setTimeout(()=>{ _ignoreRemote=false; },1500);
    scheduleSaveRemote();
}
function load(){
    try{
        const raw=localStorage.getItem(STORE); if(!raw) return;
        const d=JSON.parse(raw);
        if(d.label) document.getElementById('wbLabel').value=d.label;
        if(d.strokes) strokes=d.strokes; if(d.labels) labels=d.labels; if(d.magnets) magnets=d.magnets; if(d.aircraft) aircraft=d.aircraft; if(d.holds) holds=d.holds;
        if(d.acSize) acSize=d.acSize;
        if(d.mapMode&&d.mapMode!=='off') setTimeout(()=>setMap(d.mapMode),150);
    } catch(e){}
}
document.getElementById('wbLabel').addEventListener('input',save);

// ── Collab helpers ────────────────────────────────────────────────
function wbStateObj(){
    return {label:document.getElementById('wbLabel').value,
        strokes:strokes.map(s=>({id:s.id||null,color:s.color,width:s.width,erase:!!s.erase,eraseZoom:s.eraseZoom??null,points:s.points,geoPoints:s.geoPoints||null})),
        labels, magnets:magnets.map(m=>({id:m.id,callsign:m.callsign,rank:m.rank,x:m.x,y:m.y,color:m.color,lat:m.lat,lng:m.lng})),
        aircraft:aircraft.map(a=>({id:a.id,x:a.x,y:a.y,color:a.color,angle:a.angle||0,size:a.size||acSize,refZoom:a.refZoom??null,lat:a.lat,lng:a.lng})),
        holds:holds.map(h=>({id:h.id,x:h.x,y:h.y,color:h.color,angle:h.angle||0,size:h.size||holdSize,turns:h.turns||'RT',refZoom:h.refZoom??null,lat:h.lat,lng:h.lng})),
        acSize, mapMode};
}
// Merge two arrays by id — keeps remote as source of truth but preserves local-only items not yet synced
function _mergeById(local,remote){
    if(!remote) return local;
    if(!local||!local.length) return remote;
    const remoteIds=new Set(remote.map(x=>x.id).filter(Boolean));
    const localPending=local.filter(x=>x.id&&!remoteIds.has(x.id));
    return [...remote,...localPending];
}
function _applyPendingRemote(){
    if(_pendingRemoteState){ const p=_pendingRemoteState; _pendingRemoteState=null; applyRemoteState(p); }
}
function applyRemoteState(d){
    // Buffer updates that arrive while the user is mid-stroke; apply once the stroke is committed
    if(painting){ _pendingRemoteState=d; return; }
    if(!d) return;
    if(d.label!=null) document.getElementById('wbLabel').value=d.label;
    // Ensure every remote stroke has an id so merging works going forward
    if(d.strokes) strokes=_mergeById(strokes,d.strokes.map(s=>s.id?s:{...s,id:'s_'+Math.random().toString(36).slice(2,9)}));
    if(d.labels)  labels =_mergeById(labels, d.labels);
    if(d.magnets) magnets=_mergeById(magnets,d.magnets);
    if(d.aircraft)aircraft=_mergeById(aircraft,d.aircraft);
    if(d.holds)   holds  =_mergeById(holds,  d.holds);
    if(d.acSize)  acSize =d.acSize;
    renderMagnets(); renderAircraft(); renderHolds(); redraw();
    // Map view (mode/pan/zoom) is intentionally NOT synced — each user controls
    // their own map independently so remote saves can't pull the map elsewhere.
}
async function saveRemote(){
    setSyncDot('syncing');
    try{
        const state=wbStateObj();
        await _sb.from('whiteboard_state').upsert({id:WB_ROW_ID,state,updated_at:new Date().toISOString()});
        setSyncDot('synced');
    } catch(e){ setSyncDot('error'); }
}
let _saveTimer=null;
function scheduleSaveRemote(){
    clearTimeout(_saveTimer);
    _saveTimer=setTimeout(saveRemote,800);
}
async function loadRemote(){
    try{
        const {data,error}=await _sb.from('whiteboard_state').select('state').eq('id',WB_ROW_ID).single();
        if(!error&&data?.state){ applyRemoteState(data.state); setSyncDot('synced'); return true; }
    } catch(e){}
    return false;
}
function setSyncDot(s){
    const d=document.getElementById('collab-dot'); if(!d) return;
    d.className='collab-indicator'+(s==='synced'?' synced':s==='syncing'?' syncing':'');
    d.title=s==='synced'?'Synced':s==='syncing'?'Saving\u2026':'Offline';
}
function renderPresence(){
    const el=document.getElementById('presence-pills'); if(!el) return;
    const viewers=Object.values(_remoteViewers);
    if(viewers.length===0){ el.innerHTML=''; return; }
    el.innerHTML=viewers.map(v=>
        `<span class="presence-dot" style="background:${v.color}22;border-color:${v.color}88;color:${v.color}" title="${v.name} is viewing">${v.name}</span>`
    ).join('');
}
let _collabChannel=null;
function initCollab(){
    _sb.auth.getSession().then(({data})=>{
        const user=data?.session?.user;
        _myName=user?.user_metadata?.full_name||user?.email?.split('@')[0]||('Guest-'+_myPresenceId.slice(-4));
        startCollabChannel();
    }).catch(()=>{ _myName='Guest-'+_myPresenceId.slice(-4); startCollabChannel(); });
}
function startCollabChannel(){
    _collabChannel=_sb.channel('whiteboard:'+WB_ROW_ID,{config:{presence:{key:_myPresenceId}}});
    _collabChannel.on('postgres_changes',{event:'UPDATE',schema:'public',table:'whiteboard_state',filter:'id=eq.'+WB_ROW_ID},
        payload=>{
            if(_ignoreRemote) return;
            applyRemoteState(payload.new?.state);
            setSyncDot('synced');
        }
    );
    _collabChannel
        .on('presence',{event:'sync'},()=>{
            const state=_collabChannel.presenceState();
            _remoteViewers={};
            Object.entries(state).forEach(([key,presArr])=>{
                if(key===_myPresenceId) return;
                const p=presArr[0]; if(p) _remoteViewers[key]={name:p.name||key,color:p.color||'#a0aab4'};
            });
            renderPresence();
        })
        .on('presence',{event:'join'},({key,newPresences})=>{
            if(key===_myPresenceId) return;
            const p=newPresences[0]; if(p) _remoteViewers[key]={name:p.name||key,color:p.color||'#a0aab4'};
            renderPresence();
        })
        .on('presence',{event:'leave'},({key})=>{
            delete _remoteViewers[key]; renderPresence();
        });
    _collabChannel.subscribe(async status=>{
        if(status==='SUBSCRIBED'){
            await _collabChannel.track({name:_myName,color:_myColor});
        }
    });
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
initMap(); sizeCanvas();
(async()=>{
    const gotRemote = await loadRemote();
    if(!gotRemote) load();
    renderMagnets(); renderAircraft(); renderHolds(); redraw();
    loadRoster(); setTool('draw'); updateStatus();
    initCollab();
})();
window.addEventListener('resize',()=>{ sizeCanvas(); if(map) map.invalidateSize(); });
</script>
