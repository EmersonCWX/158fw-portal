<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight History | 158th Fighter Wing</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/member-nav.js"></script>
    <style>
        /* ── Page Layout ── */
        .page-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px 20px 60px;
        }
        .page-title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #3a3f45;
        }
        .page-title-bar h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }
        .page-title-bar p { color: #888; font-size: 0.82rem; margin-top: 4px; }
        .page-content {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 20px;
            align-items: start;
        }
        /* ── Sidebar ── */
        .pg-sidebar {
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: sticky;
            top: 78px;
        }
        .sidebar-card {
            background: #1f2226;
            border: 1px solid #3a3f45;
            border-radius: 4px;
            overflow: hidden;
        }
        .sidebar-card-header {
            background: #2a2d32;
            padding: 10px 14px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #888;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid #3a3f45;
        }
        .sidebar-card-body { padding: 14px; }
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 8px 0;
            border-bottom: 1px solid #2a2d32;
        }
        .stat-item:last-child { border-bottom: none; padding-bottom: 0; }
        .stat-label { font-size: 0.65rem; font-weight: 700; color: #666; letter-spacing: 1px; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: 700; color: #e8e8e8; }
        .stat-value.accent { color: #4caf50; }
        /* ── Main ── */
        .pg-main { display: flex; flex-direction: column; gap: 14px; }
        .hist-card {
            background: #1f2226;
            border: 1px solid #3a3f45;
            border-radius: 4px;
            overflow: hidden;
        }
        .hist-card-header {
            background: #242730;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3a3f45;
        }
        .hist-card-header h2 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #e8e8e8;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin: 0;
        }
        .hist-card-body { padding: 0; }
        /* ── Table ── */
        .hist-table {
            width: 100%;
            border-collapse: collapse;
        }
        .hist-table thead tr {
            background: #1a1d22;
        }
        .hist-table th {
            padding: 10px 14px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: left;
            border-bottom: 1px solid #2a2d32;
            white-space: nowrap;
        }
        .hist-table td {
            padding: 12px 14px;
            font-size: 0.83rem;
            color: #ccc;
            border-bottom: 1px solid #1a1d22;
            vertical-align: middle;
        }
        .hist-table tr:last-child td { border-bottom: none; }
        .hist-table tr:hover td { background: rgba(255,255,255,0.025); cursor: pointer; }
        .hist-table tr.expanded td { background: rgba(76,175,80,0.04); }
        .route-cell {
            font-family: monospace;
            font-size: 0.78rem;
            color: #888;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .expand-row td {
            background: #1a1e22 !important;
            border-bottom: 1px solid #3a3f45;
            padding: 0 !important;
        }
        .expand-inner {
            padding: 14px 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .exp-field { display: flex; flex-direction: column; gap: 4px; }
        .exp-label { font-size: 0.62rem; font-weight: 700; color: #555; letter-spacing: 1px; text-transform: uppercase; }
        .exp-value { font-size: 0.82rem; color: #bbb; line-height: 1.5; }
        .exp-value.mono { font-family: monospace; color: #88aacc; }
        /* ── Badges / tags ── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        .badge-complete { background: rgba(76,175,80,0.15); color: #4caf50; }
        .badge-partial  { background: rgba(255,193,7,0.15);  color: #ffc107; }
        .badge-failed   { background: rgba(232,90,74,0.15);  color: #e85a4a; }
        .badge-na       { background: rgba(150,150,150,0.12); color: #666; }
        /* ── State / Empty / Loading ── */
        .state-row td {
            text-align: center;
            padding: 40px 20px !important;
            color: #555;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .btn-filter {
            background: transparent;
            border: 1px solid #3a3f45;
            color: #888;
            padding: 5px 12px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            border-radius: 2px;
            transition: border-color 0.15s, color 0.15s;
        }
        .btn-filter:hover { border-color: #a0aab4; color: #ccc; }
        .loading-spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid #3a3f45;
            border-top-color: #4caf50;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .page-wrapper { padding: 16px 12px 40px; }
            .page-content { grid-template-columns: 1fr !important; }
            .pg-sidebar { position: static !important; top: auto !important; }
            .page-title-bar h1 { font-size: 1.1rem; }
            .stats-grid { grid-template-columns: 1fr 1fr !important; }
            .history-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .history-table { min-width: 480px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="page-title-bar">
            <div>
                <h1>Flight History</h1>
                <p>All logged flight records for your pilot account</p>
            </div>
        </div>

        <div class="page-content">
            <!-- Sidebar -->
            <aside class="pg-sidebar">
                <div class="sidebar-card">
                    <div class="sidebar-card-header">Pilot Stats</div>
                    <div class="sidebar-card-body">
                        <div class="stat-item">
                            <span class="stat-label">Total Flights</span>
                            <span class="stat-value accent" id="statFlights">—</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Total Flight Time</span>
                            <span class="stat-value" id="statHours">—</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Last Flight</span>
                            <span class="stat-value" id="statLastFlight" style="font-size:0.88rem;">—</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Pilot</span>
                            <span class="stat-value" id="statPilot" style="font-size:0.88rem;">—</span>
                        </div>
                    </div>
                </div>
                <div class="sidebar-card">
                    <div class="sidebar-card-header">Navigation</div>
                    <div class="sidebar-card-body" style="padding:10px 6px;">
                        <a href="post-mission.html" style="display:block;padding:8px 10px;color:#aaa;font-size:0.82rem;font-weight:600;text-decoration:none;letter-spacing:0.8px;text-transform:uppercase;border-radius:3px;transition:background 0.15s,color 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.04)';this.style.color='#ddd';" onmouseout="this.style.background='';this.style.color='#aaa';">
                            ← Log New Flight
                        </a>
                    </div>
                </div>
            </aside>

            <!-- Main content -->
            <main class="pg-main">
                <div class="hist-card">
                    <div class="hist-card-header">
                        <h2>Flight Records</h2>
                    </div>
                    <div class="hist-card-body">
                        <table class="hist-table" id="histTable">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Callsign</th>
                                    <th>Aircraft</th>
                                    <th>Route</th>
                                    <th>Flight Time</th>
                                    <th>Mission Type</th>
                                    <th>Obj. 1</th>
                                </tr>
                            </thead>
                            <tbody id="histBody">
                                <tr class="state-row">
                                    <td colspan="7">
                                        <span class="loading-spinner"></span>Loading flight records…
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gcumgpfyfqtfwbskkngt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjdW1ncGZ5ZnF0Zndic2trbmd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDczMTAsImV4cCI6MjA4ODM4MzMxMH0.OSY0XEPQp-WsFWuiGrUG5fcLIVMI3c8AxBEv2shFftg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storageKey: 'v158fw-auth' }
        });

        // ── Badges ──
        function objBadge(val) {
            if (!val) return '<span style="color:#555;">—</span>';
            const map = { COMPLETE: 'badge-complete', PARTIAL: 'badge-partial', FAILED: 'badge-failed', 'N/A': 'badge-na' };
            return `<span class="badge ${map[val] || 'badge-na'}">${val}</span>`;
        }

        // ── Parse HH:MM to total minutes ──
        function toMinutes(t) {
            if (!t || t === '--:--') return 0;
            const [h, m] = t.split(':').map(Number);
            return (isNaN(h) ? 0 : h * 60) + (isNaN(m) ? 0 : m);
        }

        function minutesToHHMM(mins) {
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        }

        // ── Render records ──
        function renderRecords(records) {
            const tbody = document.getElementById('histBody');

            if (!records || records.length === 0) {
                tbody.innerHTML = '<tr class="state-row"><td colspan="7">No flight records found. Log your first flight in Post Mission.</td></tr>';
                return;
            }

            // Stats
            document.getElementById('statFlights').textContent = records.length;
            const totalMins = records.reduce((acc, r) => acc + toMinutes(r.total_flight_time), 0);
            document.getElementById('statHours').textContent = totalMins > 0 ? minutesToHHMM(totalMins) + ' hrs' : '—';
            const last = records[0];
            document.getElementById('statLastFlight').textContent = last.mission_date || '—';
            document.getElementById('statPilot').textContent = last.pilot_callsign || '—';

            // Build rows
            let html = '';
            records.forEach((r, i) => {
                const routeDisplay = r.dep_icao && r.arr_icao
                    ? `${r.dep_icao} → ${r.arr_icao}`
                    : (r.route ? r.route.substring(0, 28) + (r.route.length > 28 ? '…' : '') : '—');

                html += `
                <tr data-idx="${i}" onclick="toggleExpand(this, ${i})">
                    <td>${r.mission_date || '—'}</td>
                    <td>${r.callsign || '—'}</td>
                    <td>${r.aircraft || '—'}</td>
                    <td class="route-cell" title="${r.route || ''}">${routeDisplay}</td>
                    <td style="font-family:monospace;color:#4caf50;">${r.total_flight_time || '—'}</td>
                    <td>${r.mission_type || '—'}</td>
                    <td>${objBadge(r.obj1_result)}</td>
                </tr>
                <tr class="expand-row" id="expand-${i}" style="display:none;">
                    <td colspan="7">
                        <div class="expand-inner">
                            <div class="exp-field">
                                <span class="exp-label">Departure</span>
                                <span class="exp-value mono">${r.dep_icao || '—'} @ ${r.takeoff_time || '—'} (${r.time_mode || 'Z'})</span>
                            </div>
                            <div class="exp-field">
                                <span class="exp-label">Arrival</span>
                                <span class="exp-value mono">${r.arr_icao || '—'} @ ${r.land_time || '—'} (${r.time_mode || 'Z'})</span>
                            </div>
                            <div class="exp-field">
                                <span class="exp-label">Tail #</span>
                                <span class="exp-value">${r.tail_number || '—'}</span>
                            </div>
                            <div class="exp-field">
                                <span class="exp-label">VATSIM CID</span>
                                <span class="exp-value mono">${r.vatsim_cid || '—'}</span>
                            </div>
                            <div class="exp-field">
                                <span class="exp-label">Obj. 2 / 3</span>
                                <span class="exp-value">${objBadge(r.obj2_result)} ${objBadge(r.obj3_result)}</span>
                            </div>
                            <div class="exp-field">
                                <span class="exp-label">Pilot Email</span>
                                <span class="exp-value" style="color:#666;">${r.user_email || '—'}</span>
                            </div>
                            <div class="exp-field" style="grid-column:1/-1;">
                                <span class="exp-label">Route</span>
                                <span class="exp-value mono" style="white-space:pre-wrap;word-break:break-all;">${r.route || '—'}</span>
                            </div>
                            <div class="exp-field" style="grid-column:1/-1;">
                                <span class="exp-label">Debrief Notes</span>
                                <span class="exp-value" style="white-space:pre-wrap;">${r.debrief_notes || '—'}</span>
                            </div>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // ── Expand / collapse row ──
        function toggleExpand(row, idx) {
            const expRow = document.getElementById(`expand-${idx}`);
            if (!expRow) return;
            const isOpen = expRow.style.display !== 'none';
            expRow.style.display = isOpen ? 'none' : 'table-row';
            row.classList.toggle('expanded', !isOpen);
        }

        // ── Load records for the signed-in user ──
        async function loadHistory() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                window.location.replace('index.html');
                return;
            }

            const { data, error } = await _supabase
                .from('flight_records')
                .select('*')
                .eq('user_email', session.user.email)
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('histBody').innerHTML =
                    `<tr class="state-row"><td colspan="7">Error loading records: ${error.message}</td></tr>`;
                return;
            }
            renderRecords(data);
        }

        loadHistory();
    </script>
</body>
</html>
